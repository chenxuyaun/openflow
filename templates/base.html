<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --bg-accent: rgba(47, 95, 208, 0.10);
        --bg-accent-soft: rgba(20, 184, 166, 0.08);
        --surface: rgba(255, 255, 255, 0.94);
        --surface-strong: #ffffff;
        --surface-muted: #eef4ff;
        --ink: #101828;
        --muted: #475467;
        --muted-soft: #667085;
        --accent: #2f5fd0;
        --accent-strong: #1f4eb8;
        --accent-soft: #dbe6ff;
        --success-soft: #dcfae6;
        --warning-soft: #fff1d6;
        --danger-soft: #fee4e2;
        --line: rgba(16, 24, 40, 0.08);
        --line-strong: rgba(16, 24, 40, 0.14);
        --shadow: 0 12px 32px rgba(16, 24, 40, 0.08);
        --radius-lg: 20px;
        --radius-md: 16px;
        --radius-sm: 14px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, var(--bg-accent), transparent 26%),
          radial-gradient(circle at top right, var(--bg-accent-soft), transparent 24%),
          linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover { color: var(--accent-strong); }
      header, main {
        max-width: 1240px;
        margin: 0 auto;
        padding: 24px;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
        padding-top: 20px;
        padding-bottom: 12px;
      }
      nav {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
      }
      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .brand strong {
        font-size: 18px;
        letter-spacing: 0.01em;
      }
      .brand span {
        color: var(--muted);
        font-size: 13px;
      }
      .nav-link {
        padding: 10px 14px;
        border-radius: 999px;
        color: var(--muted);
        border: 1px solid transparent;
      }
      .nav-link:hover {
        background: rgba(255, 255, 255, 0.7);
        border-color: var(--line);
      }
      .hero, .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }
      .hero { margin-bottom: 18px; }
      .grid {
        display: grid;
        gap: 18px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      .page-shell {
        display: grid;
        gap: 24px;
      }
      .page-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.7fr) minmax(280px, 1fr);
        gap: 24px;
        align-items: start;
      }
      .stack {
        display: grid;
        gap: 24px;
      }
      .split-hero {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.9fr);
        gap: 24px;
        align-items: stretch;
      }
      .proof-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .eyebrow {
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
        font-weight: 700;
      }
      h1, h2, h3 {
        margin-top: 0;
        color: var(--ink);
      }
      h1 {
        font-size: 38px;
        line-height: 1.16;
        margin-bottom: 12px;
      }
      h2 {
        font-size: 24px;
        line-height: 1.28;
        margin-bottom: 14px;
      }
      h3 {
        font-size: 18px;
        line-height: 1.4;
        margin-bottom: 10px;
      }
      p, li, label, input, textarea, button {
        font-size: 15px;
        line-height: 1.6;
      }
      ul { padding-left: 18px; }
      .muted { color: var(--muted); }
      .microcopy {
        color: var(--muted-soft);
        font-size: 13px;
      }
      .lede {
        font-size: 17px;
        line-height: 1.65;
        color: var(--muted);
        max-width: 720px;
      }
      .hero-actions,
      .inline-actions,
      .chips,
      .statline {
        display: flex;
        flex-wrap: wrap;
      }
      .hero-actions,
      .inline-actions { gap: 12px; }
      .chips,
      .statline { gap: 10px; }
      .hero-actions,
      .statline { margin-top: 16px; }
      .button,
      button,
      input[type="submit"] {
        appearance: none;
        border: 1px solid transparent;
        border-radius: var(--radius-sm);
        padding: 12px 18px;
        min-height: 46px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
        transition: background 140ms ease, box-shadow 140ms ease, transform 140ms ease, border-color 140ms ease;
      }
      .button:hover,
      button:hover,
      input[type="submit"]:hover {
        background: var(--accent-strong);
        box-shadow: 0 10px 24px rgba(47, 95, 208, 0.18);
      }
      .button:active,
      button:active,
      input[type="submit"]:active {
        transform: translateY(1px);
      }
      .button-secondary {
        background: rgba(255, 255, 255, 0.9);
        border-color: var(--line);
        color: var(--ink);
        box-shadow: none;
      }
      .button-secondary:hover {
        background: var(--surface-strong);
        border-color: var(--line-strong);
      }
      button:focus-visible,
      input:focus-visible,
      textarea:focus-visible,
      a:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px rgba(47, 95, 208, 0.16);
      }
      .panel-accent {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98) 0%, rgba(239, 245, 255, 0.96) 100%);
      }
      .form-grid,
      .card-grid {
        display: grid;
        gap: 16px;
      }
      .form-row {
        display: grid;
        gap: 8px;
      }
      input[type="text"],
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.9);
        color: var(--ink);
        padding: 14px 16px;
        transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
      }
      input[type="text"]:hover,
      textarea:hover {
        border-color: var(--line-strong);
      }
      input[type="text"]:focus,
      textarea:focus {
        border-color: rgba(47, 95, 208, 0.42);
        background: #fff;
        outline: none;
      }
      textarea { min-height: 130px; resize: vertical; }
      .tag {
        display: inline-block;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.84);
        font-size: 14px;
      }
      .tag-accent {
        background: var(--accent-soft);
        color: var(--accent-strong);
        border-color: transparent;
      }
      .list-card {
        border-top: 1px solid var(--line);
        padding-top: 14px;
        margin-top: 14px;
      }
      .list-card:first-child {
        margin-top: 0;
        padding-top: 0;
        border-top: none;
      }
      .support-card,
      .metric {
        padding: 16px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
      }
      .metric strong,
      .support-card strong {
        display: block;
        margin-bottom: 4px;
      }
      .stat {
        padding: 9px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid var(--line);
        color: var(--muted);
      }
      .callout {
        padding: 14px 16px;
        border-radius: var(--radius-md);
        border: 1px solid var(--line);
        background: var(--surface-muted);
      }
      .callout-warning { background: var(--warning-soft); }
      .callout-success { background: var(--success-soft); }
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
      }
      code {
        background: rgba(16, 24, 40, 0.06);
        padding: 2px 6px;
        border-radius: 6px;
      }
      @media (max-width: 900px) {
        header, main { padding: 18px; }
        .page-grid,
        .split-hero,
        .proof-grid {
          grid-template-columns: 1fr;
        }
        h1 { font-size: 31px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <strong><a href="/">OpenFlow</a></strong>
        <span>AI workspace with file-based continuity</span>
      </div>
      <nav>
        <a class="nav-link" href="/">Workspace Home</a>
        <a class="nav-link" href="/blueprint">Blueprint API</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
